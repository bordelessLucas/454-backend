services:
  # Aplicação Web Backend
  - type: web
    name: 454-backend
    runtime: docker
    rootDir: hello-prisma
    dockerfilePath: ./Dockerfile
    region: us-east-2
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://seu-frontend.onrender.com
    autoDeploy: true
